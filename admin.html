<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin Local - PlenoFuturo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="main-header">
        <div class="container header-flex">
            <div class="logo">
                <a href="index.html">Pleno<span>Futuro</span> Admin</a>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Voltar ao Site</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container admin-panel">
        <h1>Painel de Controle (LocalStorage)</h1>
        <p>Tudo o que for salvo aqui será armazenado no navegador do administrador.</p>

        <section style="margin-top: 40px; background: var(--card-bg); padding: 30px; border-radius: 10px; border: 1px solid var(--border-color);">
            <h2>Novo Artigo</h2>
            <form id="form-artigo">
                <div class="form-group">
                    <label>Título</label>
                    <input type="text" id="titulo" required>
                </div>
                <div class="form-group">
                    <label>Slug (URL amigável)</label>
                    <input type="text" id="slug" required>
                </div>
                <div class="form-group">
                    <label>Categoria (ID)</label>
                    <input type="text" id="categoriaId" value="financas" required>
                </div>
                <div class="form-group">
                    <label>Meta Description</label>
                    <textarea id="metaDesc" rows="2" required></textarea>
                </div>
                <div class="form-group">
                    <label>Conteúdo HTML</label>
                    <textarea id="conteudo" rows="8" required></textarea>
                </div>
                <button type="submit" class="btn-primary">Salvar Artigo</button>
            </form>
        </section>

        <section class="admin-list" id="lista-artigos">
            <h2>Artigos Publicados</h2>
            <!-- Preenchido via JS -->
        </section>
    </main>

    <script src="js/admin.js"></script>
</body>
</html>
